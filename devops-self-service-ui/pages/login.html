<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login - DevOps Platform</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <script src="../js/app.js"></script>
</head>
<body>

<div style="display:flex;min-height:100vh;">

  <div style="
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
    background:#0b1120;
  ">

    <div class="card" style="width:100%;max-width:480px;">
      <h1 style="margin-bottom:10px;">Enterprise Login</h1>
      <p style="color:#94a3b8;margin-bottom:30px;">
        Secure access to DevOps Self-Service Platform
      </p>

      <label>Username</label>
      <input class="input" id="username" placeholder="Enter username">

      <br><br>

      <label>Password</label>
      <input class="input" id="password" type="password" placeholder="Enter password">

      <br><br>

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <label>
          <input type="checkbox"> Remember Me
        </label>
        <a href="#" style="color:#60a5fa;">Forgot Password?</a>
      </div>

      <br>

      <button class="btn btn-primary" style="width:100%;" onclick="loginUser()">
        Login
      </button>

      <br><br>

      <button class="btn btn-secondary" style="width:100%;" onclick="gitlabSSO()">
        Login with GitLab SSO
      </button>
    </div>
  </div>

  <div style="
    flex:1;
    background:linear-gradient(135deg,#111827,#1e293b);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:50px;
  ">
    <div>
      <h1 style="font-size:42px;margin-bottom:20px;">
        DevOps Self-Service Platform
      </h1>

      <p style="
        color:#94a3b8;
        line-height:1.8;
        font-size:16px;
        max-width:520px;
      ">
        Application onboarding, GitLab CI/CD generation, cluster management,
        secret integrations, approvals, governance, and deployment automation.
      </p>
    </div>
  </div>

</div>

<script>
function loginUser() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (!user || !pass) {
    showToast("Enter username and password", "error");
    return;
  }

  showToast("Login successful");
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1200);
}

function gitlabSSO() {
  showToast("Redirecting to GitLab SSO...");
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1200);
}
</script>

</body>
</html>
